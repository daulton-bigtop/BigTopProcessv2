<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Big Top Lead-to-Cash Mapper</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="layout">
    <aside class="panel">
      <header class="panel-header">
        <div class="brand-row">
          <img id="brandLogo" src="brand/big-top-logo-2-color.png" alt="Big Top logo" onerror="this.style.display='none';" />
        </div>
        <h1>Big Top Lead-to-Cash Mapper</h1>
        <p>Enter project details and generate the exact connected workflow path.</p>
      </header>

      <section class="card">
        <h2>Project Inputs</h2>

        <div class="form-grid">
          <label>
            Lead Source
            <select id="leadSource">
              <option value="Online">Online</option>
              <option value="Email">Email</option>
              <option value="Phone">Phone</option>
              <option value="Referral">Referral</option>
              <option value="Other">Other</option>
            </select>
          </label>

          <label>
            Layout View
            <select id="layoutMode">
              <option value="parallel">Parallel View</option>
              <option value="timeline">Timeline View</option>
            </select>
          </label>

          <label>
            Customer Payment Terms
            <select id="paymentTerms">
              <option value="deposit">50% deposit / 50% before ship</option>
              <option value="net">Net terms</option>
            </select>
          </label>

          <label>
            Big Top Installation Required?
            <select id="requiresInstall">
              <option value="yes">Yes</option>
              <option value="no">No (customer install)</option>
            </select>
          </label>

          <label>
            Engineering Package Required?
            <select id="requiresEngineering">
              <option value="yes">Yes</option>
              <option value="no">No</option>
            </select>
          </label>

          <label>
            Feasibility Check Needed?
            <select id="requiresFeasibilityCheck">
              <option value="yes">Yes</option>
              <option value="no">No</option>
            </select>
          </label>

          <label>
            Offload Coordination
            <select id="offloadOwner">
              <option value="big_top">Big Top installer onsite</option>
              <option value="customer">Customer receiving team</option>
            </select>
          </label>

          <label>
            Quote Revision Rounds
            <input id="quoteRevisions" type="number" min="0" max="3" value="0" />
          </label>

          <label>
            Contract Revision Rounds
            <input id="contractRevisions" type="number" min="0" max="3" value="0" />
          </label>

          <label>
            Engineering Revision Rounds
            <input id="engineeringRevisions" type="number" min="0" max="3" value="0" />
          </label>

          <label>
            CAD Revision Rounds
            <input id="cadRevisions" type="number" min="0" max="3" value="0" />
          </label>

          <label>
            Preassign Production Slot?
            <select id="preassignSlot">
              <option value="no">No</option>
              <option value="yes">Yes</option>
            </select>
          </label>
        </div>

        <div class="button-row">
          <button id="generateBtn" type="button">Generate Recommended Path</button>
          <button id="showFullBtn" type="button" class="secondary">Show Full Workflow</button>
          <button id="downloadBtn" type="button" class="secondary">Download SVG</button>
        </div>
      </section>

      <section class="card compact">
        <h2>Path Summary</h2>
        <div id="summary"></div>
      </section>

      <details class="card compact">
        <summary>Advanced JSON (optional)</summary>
        <p class="small">Use this only if you want to manually edit lanes, steps, and connections.</p>
        <div class="button-row">
          <button id="loadTemplateBtn" type="button" class="secondary">Load Full Template JSON</button>
          <button id="renderFromJsonBtn" type="button" class="secondary">Render JSON</button>
        </div>
        <textarea id="jsonInput" spellcheck="false" rows="16"></textarea>
      </details>

      <div id="status" role="status" aria-live="polite"></div>
    </aside>

    <section class="canvas-wrap">
      <div class="legend" id="legend"></div>
      <div class="canvas-scroll" id="canvasScroll">
        <svg id="chart" xmlns="http://www.w3.org/2000/svg" aria-label="Big Top workflow chart"></svg>
      </div>
      <div id="compassNav" class="compass-nav" aria-label="Chart navigation controls">
        <button id="compassDragHandle" class="compass-drag-handle" type="button" aria-label="Drag navigation controls">Drag</button>
        <div class="compass-grid">
          <button id="compassUp" class="compass-btn up" type="button" aria-label="Scroll up">&uarr;</button>
          <button id="compassLeft" class="compass-btn left" type="button" aria-label="Scroll left">&larr;</button>
          <button id="compassCenter" class="compass-btn center" type="button" aria-label="Center chart">C</button>
          <button id="compassRight" class="compass-btn right" type="button" aria-label="Scroll right">&rarr;</button>
          <button id="compassDown" class="compass-btn down" type="button" aria-label="Scroll down">&darr;</button>
        </div>
        <div class="compass-zoom-row">
          <button id="compassZoomOut" class="compass-btn zoom" type="button" aria-label="Zoom out">-</button>
          <div id="compassZoomValue" class="compass-zoom-value" aria-live="polite">100%</div>
          <button id="compassZoomIn" class="compass-btn zoom" type="button" aria-label="Zoom in">+</button>
        </div>
      </div>

      <div id="raciModal" class="raci-modal" hidden>
        <div class="raci-dialog" role="dialog" aria-modal="true" aria-labelledby="raciTitle">
          <div class="raci-header">
            <h2 id="raciTitle">RACI Details</h2>
            <button id="raciCloseBtn" class="raci-close-btn" type="button" aria-label="Close RACI details">X</button>
          </div>

          <p id="raciMeta" class="raci-meta"></p>

          <div class="raci-lock-row">
            <span id="raciLockState" class="raci-lock-state">Read-only</span>
            <input id="raciPinInput" type="password" inputmode="numeric" maxlength="4" placeholder="PIN" aria-label="Edit PIN" />
            <button id="raciUnlockBtn" type="button" class="secondary">Unlock Edit</button>
            <button id="raciSaveBtn" type="button" disabled>Save</button>
            <button id="raciResetBtn" type="button" class="secondary" disabled>Reset</button>
          </div>

          <label>
            Lifecycle Context
            <input id="raciPhaseInput" type="text" readonly />
          </label>

          <label>
            Description
            <textarea id="raciDescriptionInput" rows="4" readonly></textarea>
          </label>

          <label>
            RACI Breakdown
            <textarea id="raciSummaryInput" rows="11" readonly></textarea>
          </label>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
